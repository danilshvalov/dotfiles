color_black="#d1d5da"
color_red="#d73a49"
color_blue="#79b8ff"
color_yellow="#dbab09"
color_bright_cyan="#3192aa"
color_bright_magenta="#5a32a3"


# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind k set-option -g status
set-option -g prefix C-b

set -g default-terminal "xterm-256color"
set-option -gas terminal-overrides "*:Tc"
set-option -gas terminal-overrides "*:RGB"

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -n M-v copy-mode

setw -g mouse on
set-window-option -g mode-keys vi

# FYI: check for true color support using tmux info | ag Tc and verify using true-color-support
# Enable True Color and RGB support
set-option -gas terminal-overrides "*:Tc"
set-option -gas terminal-overrides "*:RGB"
# Enable double/curly underline
set-option -gas terminal-overrides '*:Smulx=\E[4::%p1%dm'
set-option -gas terminal-overrides '*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Нумерация окон с единицы вместо ноля
set -g base-index 1
set-option -g base-index 1
setw -g pane-base-index 1
set -g -w automatic-rename on
set -g renumber-windows on
set -g bell-action none

# Лимит истории консоли в 1000 строк. Столько строк можно отскроллить вверх
set -g history-limit 1000

# default statusbar colors
set-option -g status-fg $color_fg
set-option -g status-bg $color_bg

bind-key -n M-\{ previous-window
bind-key -n M-\} next-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'


mode_separator=""
set -g @mode_indicator_prefix_prompt " WAIT #[default]#[fg=$color_bright_magenta]$mode_separator"
set -g @mode_indicator_prefix_mode_style bg=$color_bright_magenta,fg=$color_bg,bold
set -g @mode_indicator_copy_prompt " COPY #[default]#[fg=$color_yellow]$mode_separator"
set -g @mode_indicator_copy_mode_style bg=$color_yellow,fg=$color_bg,bold
set -g @mode_indicator_sync_prompt " SYNC #[default]#[fg=$color_red]$mode_separator"
set -g @mode_indicator_sync_mode_style bg=$color_red,fg=$color_bg,bold
set -g @mode_indicator_empty_prompt " TMUX #[default]#[fg=$color_blue]$mode_separator"
set -g @mode_indicator_empty_mode_style bg=$color_blue,fg=$color_bg,bold

set -g @batt_icon_status_charged ' '
set -g @batt_icon_status_charging '  '
set -g @batt_icon_status_discharging ' '
set -g @batt_color_charge_primary_tier8 $color_green
set -g @batt_color_charge_primary_tier7 $color_green
set -g @batt_color_charge_primary_tier6 $color_green
set -g @batt_color_charge_primary_tier5 $color_green
set -g @batt_color_charge_primary_tier4 $color_green
set -g @batt_color_charge_primary_tier3 $color_yellow
set -g @batt_color_charge_primary_tier2 $color_orange
set -g @batt_color_charge_primary_tier1 $color_red
set -g @batt_icon_charge_tier8 ''
set -g @batt_icon_charge_tier7 ''
set -g @batt_icon_charge_tier6 ''
set -g @batt_icon_charge_tier5 ''
set -g @batt_icon_charge_tier4 ''
set -g @batt_icon_charge_tier3 ''
set -g @batt_icon_charge_tier2 ''
set -g @batt_icon_charge_tier1 ''

set -g @online_icon "  "
set -g @offline_icon ""

set -g status-right-length 100
set -g status-left "#{tmux_mode_indicator}"
set -g status-right "#[bg=$color_bg,fg=$color_black]  #{cpu_percentage}   #{ram_percentage}  #{battery_icon_charge}#{battery_icon_status}#{battery_percentage} #[fg=$color_black] #[bg=$color_bg,fg=$color_black] %A %d %b %Y %H:%M "
set -g status-justify left

set -g window-status-current-format " #[fg=$color_blue,bold]#I:#W"
set -g window-status-format " #[fg=$color_black]#I:#W"



# WARN: Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
